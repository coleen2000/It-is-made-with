<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made With - Simultaneous Play</title>
    <style>
        :root {
            --p1-color: #ffedeb;
            --p2-color: #ebf5ff;
            --accent: #ff4757;
            --next-color: #2f3542;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Comic Sans MS', cursive;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .player-side {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        #p1 { background: var(--p1-color); border-right: 4px dashed #ccc; }
        #p2 { background: var(--p2-color); }

        .score-board {
            font-size: 2rem;
            background: white;
            padding: 5px 25px;
            border-radius: 40px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .drop-zone-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .drop-box {
            width: 115px;
            height: 115px;
            border: 5px dashed #a0aec0;
            border-radius: 20px;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-box img { width: 85%; height: 85%; object-fit: contain; }

        .center-ui {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        #food-display {
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 12px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: white;
            object-fit: cover;
            pointer-events: auto;
        }

        .button-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            pointer-events: auto;
        }

        .btn {
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 1.4rem;
            border-radius: 50px;
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        #next-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--next-color);
        }

        #next-btn svg { width: 30px; height: 30px; fill: white; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        .ingredient {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 15px;
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            touch-action: none;
            z-index: 5;
            box-sizing: border-box;
        }

        .ingredient img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

<div class="center-ui">
    <img id="food-display" src="images/bananabreadimage.png">
    <div class="button-group">
        <button id="start-btn" class="btn">Made With</button>
        <button id="next-btn" class="btn">
            <svg viewBox="0 0 24 24"><path d="M4 11v2h12l-5.5 5.5 1.42 1.42L19.84 12l-7.92-7.92L10.5 5.5 16 11H4z"/></svg>
        </button>
    </div>
</div>

<div class="game-container">
    <div id="p1" class="player-side">
        <div class="score-board">P1: <span id="s1">0</span></div>
        <div class="drop-zone-container">
            <div class="drop-box" data-player="p1"></div>
            <div class="drop-box" data-player="p1"></div>
            <div class="drop-box" data-player="p1"></div>
        </div>
    </div>

    <div id="p2" class="player-side">
        <div class="score-board">P2: <span id="s2">0</span></div>
        <div class="drop-zone-container">
            <div class="drop-box" data-player="p2"></div>
            <div class="drop-box" data-player="p2"></div>
            <div class="drop-box" data-player="p2"></div>
        </div>
    </div>
</div>

<script>
const foods = [
    { img: "images/bananabreadimage.png", ingredients: ["images/sugar.png","images/banana.png","images/blueberry.png","images/flour.png","images/butter.png"] },
    { img: "images/chocolatechipcookiesimage.png", ingredients: ["images/sugar.png","images/peanut butter.png","images/chocolate.png","images/flour.png","images/butter.png"] },
    { img: "images/strawberrycrumbleimage.png", ingredients: ["images/strawberry.png","images/flour.png","images/butter.png","images/cream.png","images/sugar.png"] }
];

const allIngredients = ["images/butter.png","images/cream.png","images/sugar.png","images/banana.png","images/blueberry.png","images/strawberry.png","images/chocolate.png","images/peanut butter.png","images/flour.png"];

let foodIndex = 0;
let score1 = 0;
let score2 = 0;
let active = false;

const startBtn = document.getElementById("start-btn");

startBtn.onclick = () => {
    if (active) return;
    active = true;
    startBtn.style.opacity = "0.5";
    startBtn.innerText = "Playing...";
    spawnAll("p1");
    spawnAll("p2");
};

document.getElementById("next-btn").onclick = () => {
    active = false;
    document.querySelectorAll(".ingredient").forEach(el => el.remove());
    foodIndex = (foodIndex + 1) % foods.length;
    document.getElementById("food-display").src = foods[foodIndex].img;
    startBtn.style.opacity = "1";
    startBtn.innerText = "Made With";
    resetBoxes();
};

function spawnAll(sideId) {
    allIngredients.forEach(src => createFloatingIngredient(src, sideId));
}

function createFloatingIngredient(src, sideId) {
    const parent = document.getElementById(sideId);
    const el = document.createElement("div");
    el.className = "ingredient";
    el.innerHTML = `<img src="${src}">`;
    el.dataset.src = src;
    el.dataset.side = sideId;

    let x = Math.random() * 60 + 20;
    let y = Math.random() * 40 + 20;
    let vx = (Math.random() - 0.5) * 0.5;
    let vy = (Math.random() - 0.5) * 0.5;

    parent.appendChild(el);

    setInterval(() => {
        if (el.dataset.used) return;
        x += vx; y += vy;
        if (x < 5 || x > 85) vx *= -1;
        if (y < 15 || y > 75) vy *= -1;
        el.style.left = x + "%";
        el.style.top = y + "%";
    }, 16);

    // CLICK INSTEAD OF DRAG
    el.addEventListener("click", () => {
        if (!active || el.dataset.used) return;
        el.dataset.used = true;

        const side = el.dataset.side;
        const src = el.dataset.src;

        const boxes = document.querySelectorAll(`.drop-box[data-player="${side}"]`);

        for (let box of boxes) {
            if (box.innerHTML === "") {
                const isCorrect = foods[foodIndex].ingredients.includes(src);

                box.innerHTML = `<img src="${src}">`;

                if (isCorrect) {
                    box.style.background = "#2ed573";
                    if (side === "p1") score1++; else score2++;
                } else {
                    box.style.background = "#ff4757";
                    if (side === "p1") score1--; else score2--;
                }

                updateScore();
                el.remove();
                break;
            }
        }
    });
}

function resetBoxes() {
    document.querySelectorAll(".drop-box").forEach(box => {
        box.innerHTML = "";
        box.style.background = "rgba(255,255,255,0.7)";
    });
}

function updateScore() {
    document.getElementById("s1").innerText = score1;
    document.getElementById("s2").innerText = score2;
}
</script>

</body>
</html>
